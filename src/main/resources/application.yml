spring:
  application:
    name: lottery-tickets

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.lottery.tickets: DEBUG

app:
  security:
    admin-username: ${ADMIN_USERNAME}
    admin-password: ${ADMIN_PASSWORD}